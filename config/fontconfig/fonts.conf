<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
    <match target="font">
        <edit name="antialias" mode="assign">
            <bool>true</bool>
        </edit>
        <edit mode="assign" name="embeddedbitmap">
            <bool>false</bool>
        </edit>
        <edit name="hinting" mode="assign">
            <bool>true</bool>
        </edit>
        <edit name="hintstyle" mode="assign">
            <const>hintslight</const>
        </edit>
        <edit name="lcdfilter" mode="assign">
            <const>lcddefault</const>
        </edit>
        <edit name="rgba" mode="assign">
            <const>rgb</const>
        </edit>
    </match>
    <alias>
        <family>sans-serif</family>
        <prefer>
            <!-- Default -->
            <family>Noto Sans</family>
            <!-- Japanese -->
            <family>Noto Sans CJK JP</family>
            <!-- Korean -->
            <family>Noto Sans CJK KR</family>
            <!-- Chinese -->
            <family>Noto Sans CJK SC</family>
            <family>Noto Sans CJK TC</family>
        </prefer>
    </alias>
    <alias>
        <family>serif</family>
        <prefer>
            <!-- Default -->
            <family>Noto Serif</family>
            <!-- Japanese -->
            <family>IPAexMincho</family>
            <!-- Korean -->
            <family>NanumMyeongjo</family>
            <!-- Chinese -->
            <family>Noto Serif CJK SC</family>
            <family>Noto Serif CJK TC</family>
        </prefer>
    </alias>
    <alias>
        <family>monospace</family>
        <prefer>
            <!-- Default -->
            <family>JetBrains Mono NL</family>
            <!-- Japanese -->
            <family>Sarasa Mono J</family>
            <!-- Korean -->
            <family>Sarasa Mono K</family>
            <!-- Chinese -->
            <family>Sarasa Mono SC</family>
            <family>Sarasa Mono TC</family>
        </prefer>
    </alias>
    <!-- Noto CJK Redirect -->
    <match target="pattern">
        <test qual="any" name="family" compare="eq">
            <string>Noto Sans JP</string>
        </test>
        <edit name="family" mode="assign" binding="same">
            <string>Noto Sans CJK JP</string>
        </edit>
    </match>
    <match target="pattern">
        <test qual="any" name="family" compare="eq">
            <string>Noto Sans KR</string>
        </test>
        <edit name="family" mode="assign" binding="same">
            <string>Noto Sans CJK KR</string>
        </edit>
    </match>
    <match target="pattern">
        <test qual="any" name="family" compare="eq">
            <string>Noto Sans SC</string>
        </test>
        <edit name="family" mode="assign" binding="same">
            <string>Noto Sans CJK SC</string>
        </edit>
    </match>
    <match target="pattern">
        <test qual="any" name="family" compare="eq">
            <string>Noto Sans TC</string>
        </test>
        <edit name="family" mode="assign" binding="same">
            <string>Noto Sans CJK TC</string>
        </edit>
    </match>
    <match target="pattern">
        <test qual="any" name="family" compare="eq">
            <string>Noto Sans HK</string>
        </test>
        <edit name="family" mode="assign" binding="same">
            <string>Noto Sans CJK HK</string>
        </edit>
    </match>
</fontconfig>
